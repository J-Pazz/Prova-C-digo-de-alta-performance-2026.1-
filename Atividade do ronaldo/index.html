<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <title>To-do List</title>
</head>
<body>
    <header>
        <h1>To-Do List</h1>
    </header>
    <!-- Estrutura HTML para a aplicação de lista de tarefas -->
    <main class="containerTask">
        <section class="requestInput">
            <input class="newTask" id="inputTask" type="text" placeholder="Informe a tarefa">
            <button class="btnAdd btn" id="add">Adicionar</button>
        </section>
        <ul id="list">
        </ul>
    </main>

    <script src="src/js/main.js"></script>
</body>
</html>
